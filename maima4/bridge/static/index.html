<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ponte — Local AI Bridge</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a1420;
    --bg-deep: #060d16;
    --panel: #101d2e;
    --border: #223650;
    --text: #e4ecf5;
    --muted: #7d93ac;
    --amber: #f2a93c;
    --cyan: #3ee6d0;
    --violet: #a48af5;
    --coral: #ff6b5e;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: 'Space Grotesk', sans-serif;
    background:
      radial-gradient(ellipse 900px 500px at 50% -10%, rgba(62,230,208,0.06), transparent),
      var(--bg);
    color: var(--text);
    padding: 40px 16px 60px;
  }
  .wrap { max-width: 760px; margin: 0 auto; }
  .eyebrow {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.72rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--cyan);
    margin-bottom: 6px;
  }
  h1 { font-size: 1.75rem; font-weight: 700; margin: 0 0 4px; letter-spacing: -0.01em; }
  .sub { color: var(--muted); margin-bottom: 28px; font-size: 0.92rem; }
  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 22px;
    margin-bottom: 18px;
  }
  .panel-title {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.72rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 16px;
  }
  .status-row { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; }
  .status-line { display: flex; align-items: center; gap: 8px; font-size: 0.9rem; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); flex-shrink: 0; }
  .dot.up { background: var(--cyan); box-shadow: 0 0 8px var(--cyan); }
  .dot.down { background: var(--coral); box-shadow: 0 0 8px var(--coral); }
  a.docs-link { color: var(--muted); font-size: 0.82rem; font-family: 'IBM Plex Mono', monospace; text-decoration: none; border-bottom: 1px dotted var(--muted); }
  a.docs-link:hover { color: var(--cyan); border-color: var(--cyan); }
  label {
    display: block;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.72rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
    margin-top: 16px;
  }
  label:first-child { margin-top: 0; }
  input, select, textarea {
    width: 100%;
    background: var(--bg-deep);
    border: 1px solid var(--border);
    border-radius: 7px;
    color: var(--text);
    padding: 10px 12px;
    font-size: 0.9rem;
    font-family: 'IBM Plex Mono', monospace;
  }
  input:focus, select:focus, textarea:focus {
    outline: none;
    border-color: var(--cyan);
    box-shadow: 0 0 0 3px rgba(62,230,208,0.12);
  }
  textarea { resize: vertical; min-height: 90px; line-height: 1.5; }
  .row { display: flex; gap: 12px; }
  .row > div { flex: 1; }
  button {
    margin-top: 20px;
    background: var(--cyan);
    color: #06251f;
    border: none;
    border-radius: 7px;
    padding: 12px 20px;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 0.92rem;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.1s ease, opacity 0.15s ease;
  }
  button:hover { opacity: 0.9; }
  button:active { transform: scale(0.98); }
  button:disabled { opacity: 0.45; cursor: not-allowed; }
  .bridge-panel { padding-bottom: 26px; }
  .bridge-svg { width: 100%; height: auto; display: block; }
  .shore-label { font-family: 'IBM Plex Mono', monospace; font-size: 10px; fill: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }
  .checkpoint-label { font-family: 'IBM Plex Mono', monospace; font-size: 10.5px; fill: var(--muted); }
  .pylon { transition: stroke 0.35s ease, filter 0.35s ease; }
  .pylon-fill { transition: fill 0.35s ease; }
  pre {
    white-space: pre-wrap;
    word-break: break-word;
    background: var(--bg-deep);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.83rem;
    margin-top: 10px;
    line-height: 1.6;
  }
  .badge { display: inline-block; padding: 3px 10px; border-radius: 5px; font-size: 0.74rem; font-weight: 600; font-family: 'IBM Plex Mono', monospace; letter-spacing: 0.03em; }
  .badge.allow { background: rgba(62,230,208,0.14); color: var(--cyan); }
  .badge.redact { background: rgba(164,138,245,0.14); color: var(--violet); }
  .badge.deny { background: rgba(255,107,94,0.14); color: var(--coral); }
  .badge.neutral { background: rgba(125,147,172,0.14); color: var(--muted); }
  #resultPanel { display: none; }
</style>
</head>
<body>
<div class="wrap">
  <div class="eyebrow">local ai bridge</div>
  <h1>Ponte</h1>
  <div class="sub">Ogni richiesta attraversa i checkpoint reali del bridge prima di raggiungere il provider esterno.</div>

  <div class="panel">
    <div class="status-row">
      <div class="status-line">
        <span id="healthDot" class="dot"></span>
        <span id="health">verifica in corso…</span>
      </div>
      <a class="docs-link" href="/docs" target="_blank">documentazione → /docs</a>
    </div>
  </div>

  <div class="panel">
    <div class="panel-title">Componi richiesta</div>
    <label>X-Bridge-Key</label>
    <input id="apiKey" type="text" placeholder="chiave-super-segreta-1" value="chiave-super-segreta-1">
    <div class="row">
      <div>
        <label>Operazione</label>
        <select id="operation">
          <option value="summarize">summarize</option>
          <option value="translate">translate</option>
          <option value="classify">classify</option>
          <option value="extract">extract</option>
        </select>
      </div>
      <div>
        <label>Sensibilità</label>
        <select id="sensitivity">
          <option value="public">public</option>
          <option value="internal" selected>internal</option>
          <option value="confidential">confidential</option>
        </select>
      </div>
    </div>
    <label>Payload</label>
    <textarea id="payload">Contatta mario.rossi@example.com per il bonifico di 250 EUR.</textarea>
    <label>Max output tokens</label>
    <input id="maxTokens" type="number" value="300" min="1" max="4000">
    <button id="sendBtn">Invia richiesta →</button>
  </div>

  <div class="panel bridge-panel">
    <div class="panel-title">Percorso della richiesta</div>
    <svg class="bridge-svg" viewBox="0 0 720 150" xmlns="http://www.w3.org/2000/svg">
      <line x1="40" y1="90" x2="680" y2="90" stroke="#24374e" stroke-width="3" id="deckLine"/>
      <circle cx="40" cy="90" r="7" fill="#4f6a86"/>
      <text x="40" y="120" text-anchor="middle" class="shore-label">agente</text>
      <g id="cp-whitelist">
        <line x1="190" y1="60" x2="190" y2="90" stroke="#24374e" stroke-width="3" class="pylon"/>
        <circle cx="190" cy="55" r="9" fill="#16283c" stroke="#24374e" stroke-width="2.5" class="pylon"/>
        <text x="190" y="120" text-anchor="middle" class="checkpoint-label">whitelist</text>
      </g>
      <g id="cp-ratelimit">
        <line x1="340" y1="60" x2="340" y2="90" stroke="#24374e" stroke-width="3" class="pylon"/>
        <circle cx="340" cy="55" r="9" fill="#16283c" stroke="#24374e" stroke-width="2.5" class="pylon"/>
        <text x="340" y="120" text-anchor="middle" class="checkpoint-label">rate limit</text>
      </g>
      <g id="cp-redact">
        <line x1="490" y1="60" x2="490" y2="90" stroke="#24374e" stroke-width="3" class="pylon" stroke-dasharray="3 3"/>
        <circle cx="490" cy="55" r="9" fill="#16283c" stroke="#24374e" stroke-width="2.5" class="pylon"/>
        <text x="490" y="120" text-anchor="middle" class="checkpoint-label">redazione</text>
      </g>
      <g id="cp-provider">
        <circle cx="680" cy="90" r="7" fill="#4f6a86" class="pylon-fill"/>
        <text x="680" y="120" text-anchor="middle" class="shore-label">provider</text>
      </g>
      <circle id="token" cx="40" cy="90" r="5.5" fill="#e4ecf5" opacity="0"/>
    </svg>
  </div>

  <div class="panel" id="resultPanel">
    <div class="panel-title">Risultato</div>
    <div class="status-line">
      <span id="decisionBadge" class="badge neutral">—</span>
      <span id="latencyLabel" style="font-family:'IBM Plex Mono',monospace; font-size:0.78rem; color:var(--muted);"></span>
    </div>
    <pre id="resultBox"></pre>
  </div>
</div>

<script>
async function checkHealth() {
  const el = document.getElementById('health');
  const dot = document.getElementById('healthDot');
  try {
    const res = await fetch('/health');
    if (res.ok) {
      const data = await res.json();
      el.textContent = 'operativo · ' + data.status;
      dot.className = 'dot up';
    } else {
      el.textContent = 'risponde con errore ' + res.status;
      dot.className = 'dot down';
    }
  } catch (e) {
    el.textContent = 'non raggiungibile';
    dot.className = 'dot down';
  }
}
checkHealth();

const CP = {
  whitelist: document.querySelectorAll('#cp-whitelist .pylon'),
  ratelimit: document.querySelectorAll('#cp-ratelimit .pylon'),
  redact: document.querySelectorAll('#cp-redact .pylon'),
  provider: document.querySelectorAll('#cp-provider .pylon-fill'),
};
const token = document.getElementById('token');
const COLORS = { pass: '#3ee6d0', redact: '#a48af5', block: '#ff6b5e', idle: '#24374e' };

function resetBridge() {
  Object.values(CP).flatMap(list => Array.from(list)).forEach(el => {
    if (el.tagName === 'circle' && el.classList.contains('pylon-fill')) {
      el.setAttribute('fill', '#4f6a86');
    } else if (el.tagName === 'circle') {
      el.setAttribute('stroke', COLORS.idle);
      el.style.filter = 'none';
    } else {
      el.setAttribute('stroke', COLORS.idle);
    }
  });
  token.setAttribute('opacity', '0');
}

function paint(group, color) {
  group.forEach(el => {
    if (el.tagName === 'circle' && el.classList.contains('pylon-fill')) {
      el.setAttribute('fill', color);
    } else if (el.tagName === 'circle') {
      el.setAttribute('stroke', color);
      el.style.filter = 'drop-shadow(0 0 4px ' + color + ')';
    } else {
      el.setAttribute('stroke', color);
    }
  });
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

async function animateJourney(stopAt, finalColor) {
  const stops = [
    { x: 190, key: 'whitelist' },
    { x: 340, key: 'ratelimit' },
    { x: 490, key: 'redact' },
    { x: 680, key: 'provider' },
  ];
  resetBridge();
  token.setAttribute('opacity', '1');
  for (const stop of stops) {
    await sleep(220);
    token.setAttribute('cx', String(stop.x));
    const reachedButBlockedHere = stop.key === stopAt;
    if (reachedButBlockedHere) {
      paint(CP[stop.key], finalColor);
      if (finalColor === COLORS.block) return;
    } else {
      paint(CP[stop.key], COLORS.pass);
    }
    if (stop.key === stopAt) break;
  }
}

document.getElementById('sendBtn').addEventListener('click', async () => {
  const btn = document.getElementById('sendBtn');
  const resultPanel = document.getElementById('resultPanel');
  const resultBox = document.getElementById('resultBox');
  const badge = document.getElementById('decisionBadge');
  const latencyLabel = document.getElementById('latencyLabel');

  const apiKey = document.getElementById('apiKey').value;
  const operation = document.getElementById('operation').value;
  const sensitivity = document.getElementById('sensitivity').value;
  const payload = document.getElementById('payload').value;
  const maxTokens = parseInt(document.getElementById('maxTokens').value, 10) || 300;

  btn.disabled = true;
  btn.textContent = 'Invio in corso…';
  resultPanel.style.display = 'block';
  badge.className = 'badge neutral';
  badge.textContent = '—';
  resultBox.textContent = '';
  latencyLabel.textContent = '';

  try {
    const res = await fetch('/v1/bridge/request', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'X-Bridge-Key': apiKey
      },
      body: JSON.stringify({
        operation, payload, sensitivity,
        max_output_tokens: maxTokens
      })
    });

    const data = await res.json();

    if (res.ok) {
      const decision = data.decision || 'allow';
      const reason = (data.denial_reason || '').toLowerCase();

      if (decision === 'deny') {
        badge.className = 'badge deny';
        badge.textContent = 'deny';
        if (reason.includes('whitelist')) await animateJourney('whitelist', COLORS.block);
        else if (reason.includes('rate limit') || reason.includes('volume limit')) await animateJourney('ratelimit', COLORS.block);
        else await animateJourney('redact', COLORS.block);
      } else if (decision === 'allow_with_redaction') {
        badge.className = 'badge redact';
        badge.textContent = 'allow · redatto';
        await animateJourney('provider', COLORS.pass);
        paint(CP.redact, COLORS.redact);
      } else {
        badge.className = 'badge allow';
        badge.textContent = 'allow';
        await animateJourney('provider', COLORS.pass);
      }

      if (data.latency_ms != null) latencyLabel.textContent = data.latency_ms + ' ms';
    } else {
      badge.className = 'badge deny';
      badge.textContent = 'HTTP ' + res.status;
    }
    resultBox.textContent = JSON.stringify(data, null, 2);
  } catch (e) {
    badge.className = 'badge deny';
    badge.textContent = 'errore di rete';
    resultBox.textContent = String(e);
  } finally {
    btn.disabled = false;
    btn.textContent = 'Invia richiesta →';
  }
});
</script>
</body>
</html>
